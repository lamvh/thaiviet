<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ThaiViet Ltd</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      Encodes the requested deep-link path into a query string and redirects to
      index.html, where the decode snippet restores the real URL before React mounts.
      pathSegmentsToKeep = 1 keeps the "/thaiviet/" project-page prefix.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
